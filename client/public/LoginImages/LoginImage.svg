<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Secure sign in illustration">
  <defs>
    <linearGradient id="lg-o" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF8A3D"/><stop offset="1" stop-color="#FF6500"/>
    </linearGradient>
    <linearGradient id="lg-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#F4F6FA"/>
    </linearGradient>
    <filter id="lg-sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#FF6500" flood-opacity="0.18"/>
    </filter>
  </defs>

  <circle cx="300" cy="96" r="66" fill="#FF6500" opacity="0.12"/>
  <circle cx="84" cy="300" r="50" fill="#FF6500" opacity="0.09"/>
  <circle cx="200" cy="200" r="120" fill="none" stroke="#FF6500" stroke-opacity="0.18" stroke-width="1.5" stroke-dasharray="3 9"/>

  <!-- Sign-in card -->
  <g filter="url(#lg-sh)">
    <rect x="96" y="92" width="208" height="216" rx="22" fill="url(#lg-card)" stroke="#E7EBF1" stroke-width="1.5"/>
  </g>

  <!-- Avatar -->
  <circle cx="200" cy="136" r="30" fill="url(#lg-o)"/>
  <circle cx="200" cy="126" r="11" fill="#FFFFFF"/>
  <path d="M182 152c2-10 9-15 18-15s16 5 18 15z" fill="#FFFFFF"/>

  <!-- Input fields -->
  <rect x="128" y="186" width="144" height="20" rx="10" fill="#EEF1F6"/>
  <circle cx="142" cy="196" r="4" fill="#C7CFDC"/>
  <rect x="128" y="216" width="144" height="20" rx="10" fill="#EEF1F6"/>
  <circle cx="142" cy="226" r="4" fill="#C7CFDC"/>
  <rect x="232" y="221" width="12" height="10" rx="2" fill="#FFB98C"/>

  <!-- Login button -->
  <rect x="128" y="250" width="144" height="30" rx="15" fill="url(#lg-o)"/>
  <rect x="170" y="262" width="60" height="6" rx="3" fill="#FFFFFF" opacity="0.9"/>

  <!-- Lock badge -->
  <g filter="url(#lg-sh)">
    <circle cx="288" cy="252" r="30" fill="#FFFFFF" stroke="#E7EBF1" stroke-width="1.5"/>
  </g>
  <rect x="276" y="250" width="24" height="20" rx="5" fill="url(#lg-o)"/>
  <path d="M281 250v-5a7 7 0 0 1 14 0v5" fill="none" stroke="#FF6500" stroke-width="3"/>
  <circle cx="288" cy="259" r="3" fill="#FFFFFF"/>

  <!-- Sparkle -->
  <path d="M120 70c2 9 5 12 14 14-9 2-12 5-14 14-2-9-5-12-14-14 9-2 12-5 14-14z" fill="url(#lg-o)"/>
</svg>
