<svg width="600" height="600" viewBox="0 0 600 600" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="About ProfilizePro: AI-driven assessments and analytics">
  <defs>
    <linearGradient id="ab-o" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF8A3D"/><stop offset="1" stop-color="#FF6500"/>
    </linearGradient>
    <linearGradient id="ab-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#F4F6FA"/>
    </linearGradient>
    <filter id="ab-sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#FF6500" flood-opacity="0.16"/>
    </filter>
  </defs>

  <circle cx="300" cy="300" r="210" fill="#FF6500" opacity="0.08"/>
  <circle cx="300" cy="300" r="210" fill="none" stroke="#FF6500" stroke-opacity="0.16" stroke-width="2" stroke-dasharray="4 12"/>
  <circle cx="470" cy="150" r="70" fill="#FF6500" opacity="0.10"/>

  <!-- Analytics dashboard card -->
  <g filter="url(#ab-sh)">
    <rect x="150" y="200" width="240" height="200" rx="26" fill="url(#ab-card)" stroke="#E7EBF1" stroke-width="2"/>
  </g>
  <rect x="176" y="226" width="96" height="14" rx="7" fill="url(#ab-o)"/>
  <rect x="176" y="250" width="64" height="9" rx="4.5" fill="#C7CFDC"/>

  <!-- Bar chart -->
  <rect x="176" y="320" width="22" height="40" rx="6" fill="#FFB98C"/>
  <rect x="208" y="300" width="22" height="60" rx="6" fill="#FF8A3D"/>
  <rect x="240" y="280" width="22" height="80" rx="6" fill="url(#ab-o)"/>
  <rect x="272" y="312" width="22" height="48" rx="6" fill="#FFB98C"/>
  <!-- Trend line -->
  <path d="M186 312l32-14 32-18 32 8" fill="none" stroke="#FF6500" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="186" cy="312" r="4" fill="#FF6500"/>
  <circle cx="282" cy="288" r="4" fill="#FF6500"/>

  <!-- Score ring badge -->
  <g filter="url(#ab-sh)">
    <circle cx="404" cy="246" r="62" fill="#FFFFFF" stroke="#E7EBF1" stroke-width="2"/>
  </g>
  <circle cx="404" cy="246" r="42" fill="none" stroke="#EEF1F6" stroke-width="11"/>
  <circle cx="404" cy="246" r="42" fill="none" stroke="url(#ab-o)" stroke-width="11" stroke-linecap="round" stroke-dasharray="263.8" stroke-dashoffset="52" transform="rotate(-90 404 246)"/>
  <text x="404" y="248" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#FF6500">A+</text>
  <text x="404" y="268" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#9AA6B6">GRADE</text>

  <!-- Target / mission badge -->
  <g filter="url(#ab-sh)">
    <circle cx="206" cy="430" r="46" fill="#FFFFFF" stroke="#E7EBF1" stroke-width="2"/>
  </g>
  <circle cx="206" cy="430" r="30" fill="none" stroke="#FFD9BE" stroke-width="6"/>
  <circle cx="206" cy="430" r="17" fill="none" stroke="#FF8A3D" stroke-width="6"/>
  <circle cx="206" cy="430" r="5" fill="url(#ab-o)"/>

  <!-- AI sparkles -->
  <path d="M150 130c3 13 7 17 20 20-13 3-17 7-20 20-3-13-7-17-20-20 13-3 17-7 20-20z" fill="url(#ab-o)"/>
  <path d="M430 410c2 10 5 13 15 15-10 2-13 5-15 15-2-10-5-13-15-15 10-2 13-5 15-15z" fill="#FF6500" opacity="0.8"/>
</svg>
