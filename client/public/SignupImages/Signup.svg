<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Create your account illustration">
  <defs>
    <linearGradient id="su-o" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF8A3D"/><stop offset="1" stop-color="#FF6500"/>
    </linearGradient>
    <linearGradient id="su-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#F4F6FA"/>
    </linearGradient>
    <filter id="su-sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#FF6500" flood-opacity="0.18"/>
    </filter>
  </defs>

  <circle cx="98" cy="100" r="64" fill="#FF6500" opacity="0.12"/>
  <circle cx="312" cy="296" r="52" fill="#FF6500" opacity="0.09"/>
  <circle cx="200" cy="200" r="122" fill="none" stroke="#FF6500" stroke-opacity="0.18" stroke-width="1.5" stroke-dasharray="3 9"/>

  <g filter="url(#su-sh)">
    <rect x="96" y="90" width="208" height="220" rx="22" fill="url(#su-card)" stroke="#E7EBF1" stroke-width="1.5"/>
  </g>

  <!-- Avatar with plus badge -->
  <circle cx="200" cy="134" r="30" fill="url(#su-o)"/>
  <circle cx="200" cy="124" r="11" fill="#FFFFFF"/>
  <path d="M182 150c2-10 9-15 18-15s16 5 18 15z" fill="#FFFFFF"/>
  <circle cx="226" cy="150" r="13" fill="#FFFFFF" stroke="#FF6500" stroke-width="2"/>
  <path d="M226 144v12M220 150h12" stroke="#FF6500" stroke-width="2.6" stroke-linecap="round"/>

  <!-- Fields -->
  <rect x="128" y="184" width="144" height="18" rx="9" fill="#EEF1F6"/>
  <rect x="128" y="210" width="144" height="18" rx="9" fill="#EEF1F6"/>
  <rect x="128" y="236" width="144" height="18" rx="9" fill="#EEF1F6"/>

  <!-- Sign up button -->
  <rect x="128" y="266" width="144" height="30" rx="15" fill="url(#su-o)"/>
  <rect x="168" y="278" width="64" height="6" rx="3" fill="#FFFFFF" opacity="0.9"/>

  <!-- Check badge -->
  <g filter="url(#su-sh)">
    <circle cx="290" cy="116" r="26" fill="#FFFFFF" stroke="#E7EBF1" stroke-width="1.5"/>
  </g>
  <circle cx="290" cy="116" r="15" fill="url(#su-o)"/>
  <path d="M283 116.5l4 4 9-10" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <path d="M118 320c1.6 8 4 10.4 12 12-8 1.6-10.4 4-12 12-1.6-8-4-10.4-12-12 8-1.6 10.4-4 12-12z" fill="url(#su-o)" opacity="0.9"/>
</svg>
