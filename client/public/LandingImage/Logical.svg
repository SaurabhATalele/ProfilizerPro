<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Logical assessments illustration">
  <defs>
    <linearGradient id="lo-orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF8A3D"/>
      <stop offset="1" stop-color="#FF6500"/>
    </linearGradient>
  </defs>

  <!-- Halo -->
  <circle cx="100" cy="100" r="70" fill="#FF6500" opacity="0.14"/>
  <circle cx="100" cy="100" r="70" fill="none" stroke="#FF6500" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="4 8"/>

  <!-- Lightbulb (idea / reasoning) -->
  <path d="M100 50c-22 0-38 16-38 37 0 14 8 23 15 30 3 3 5 6 5 10h36c0-4 2-7 5-10 7-7 15-16 15-30 0-21-16-37-38-37z" fill="#FFFFFF"/>
  <path d="M100 50c-22 0-38 16-38 37 0 14 8 23 15 30 3 3 5 6 5 10h36c0-4 2-7 5-10 7-7 15-16 15-30 0-21-16-37-38-37z" fill="none" stroke="#E7EBF1" stroke-width="1.5"/>

  <!-- Bulb base -->
  <rect x="86" y="130" width="28" height="9" rx="3" fill="#FFB98C"/>
  <rect x="89" y="141" width="22" height="8" rx="3" fill="#FF8A3D"/>
  <rect x="93" y="151" width="14" height="7" rx="3.5" fill="#FF6500"/>

  <!-- Connected reasoning nodes inside the bulb -->
  <g stroke="url(#lo-orange)" stroke-width="2.6" stroke-linecap="round">
    <line x1="100" y1="78" x2="83" y2="96"/>
    <line x1="100" y1="78" x2="117" y2="96"/>
    <line x1="83" y1="96" x2="100" y2="112"/>
    <line x1="117" y1="96" x2="100" y2="112"/>
  </g>
  <circle cx="100" cy="78" r="7" fill="url(#lo-orange)"/>
  <circle cx="83" cy="96" r="6" fill="#FF6500"/>
  <circle cx="117" cy="96" r="6" fill="#FF6500"/>
  <circle cx="100" cy="112" r="7" fill="url(#lo-orange)"/>
  <circle cx="100" cy="78" r="2.6" fill="#FFFFFF"/>
  <circle cx="100" cy="112" r="2.6" fill="#FFFFFF"/>

  <!-- Idea rays -->
  <g stroke="#FF6500" stroke-width="3" stroke-linecap="round" opacity="0.85">
    <line x1="48" y1="60" x2="40" y2="54"/>
    <line x1="152" y1="60" x2="160" y2="54"/>
    <line x1="44" y1="92" x2="34" y2="92"/>
    <line x1="156" y1="92" x2="166" y2="92"/>
  </g>
</svg>
