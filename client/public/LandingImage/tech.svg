<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Technical assessments illustration">
  <defs>
    <linearGradient id="te-orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF8A3D"/>
      <stop offset="1" stop-color="#FF6500"/>
    </linearGradient>
  </defs>

  <!-- Halo -->
  <circle cx="100" cy="100" r="70" fill="#FF6500" opacity="0.14"/>
  <circle cx="100" cy="100" r="70" fill="none" stroke="#FF6500" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="4 8"/>

  <!-- Code editor window -->
  <rect x="50" y="58" width="100" height="76" rx="12" fill="#FFFFFF"/>
  <rect x="50" y="58" width="100" height="76" rx="12" fill="none" stroke="#E7EBF1" stroke-width="1.5"/>
  <!-- Title bar -->
  <path d="M50 70a12 12 0 0 1 12-12h76a12 12 0 0 1 12 12v8H50z" fill="#FFF1E7"/>
  <circle cx="64" cy="68" r="3.2" fill="#FF6500"/>
  <circle cx="75" cy="68" r="3.2" fill="#FFB98C"/>
  <circle cx="86" cy="68" r="3.2" fill="#D3DAE5"/>

  <!-- Code lines -->
  <rect x="62" y="90" width="14" height="6" rx="3" fill="#FFB98C"/>
  <rect x="80" y="90" width="40" height="6" rx="3" fill="#D3DAE5"/>
  <rect x="70" y="103" width="30" height="6" rx="3" fill="#FF8A3D"/>
  <rect x="104" y="103" width="24" height="6" rx="3" fill="#D3DAE5"/>
  <rect x="62" y="116" width="20" height="6" rx="3" fill="#D3DAE5"/>

  <!-- Big code brackets </> -->
  <g stroke="url(#te-orange)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M86 150l-12 11 12 11"/>
    <path d="M114 150l12 11-12 11"/>
    <path d="M104 147l-8 28"/>
  </g>

  <!-- Gear accent -->
  <g transform="translate(140 122)">
    <circle r="16" fill="url(#te-orange)"/>
    <circle r="6" fill="#FFFFFF"/>
    <g fill="url(#te-orange)" stroke="#FFFFFF" stroke-width="1">
      <rect x="-2.4" y="-22" width="4.8" height="8" rx="1.5"/>
      <rect x="-2.4" y="14" width="4.8" height="8" rx="1.5"/>
      <rect x="-22" y="-2.4" width="8" height="4.8" rx="1.5"/>
      <rect x="14" y="-2.4" width="8" height="4.8" rx="1.5"/>
    </g>
  </g>
</svg>
