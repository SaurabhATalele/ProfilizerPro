    <path d="M104 196h120a16 16 0 0 1 16 16v44a16 16 0 0 1-16 16h-12v22l-24-22h-84a16 16 0 0 1-16-16v-44a16 16 0 0 1 16-16z" fill="url(#cl-o)"/>
  </g>
  <rect x="124" y="220" width="92" height="9" rx="4.5" fill="#FFFFFF" opacity="0.95"/>
