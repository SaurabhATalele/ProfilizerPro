  <rect x="197" y="123" width="9" height="16" rx="4" fill="url(#cl-o)"/>
  <rect x="222" y="123" width="9" height="16" rx="4" fill="url(#cl-o)"/>
  <path d="M226 139v3a8 8 0 0 1-8 8h-4" fill="none" stroke="url(#cl-o)" stroke-width="3" stroke-linecap="round"/>

  <path d="M70 300c1.6 8 4 10.4 12 12-8 1.6-10.4 4-12 12-1.6-8-4-10.4-12-12 8-1.6 10.4-4 12-12z" fill="url(#cl-o)" opacity="0.85"/>
