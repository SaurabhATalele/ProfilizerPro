<svg width="350" height="450" viewBox="0 0 280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Send us a message illustration">
  <defs>
    <linearGradient id="cr-o" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF8A3D"/><stop offset="1" stop-color="#FF6500"/>
    </linearGradient>
    <filter id="cr-sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#FF6500" flood-opacity="0.18"/>
    </filter>
  </defs>

  <circle cx="140" cy="180" r="118" fill="#FF6500" opacity="0.10"/>
  <circle cx="140" cy="180" r="118" fill="none" stroke="#FF6500" stroke-opacity="0.18" stroke-width="1.5" stroke-dasharray="3 9"/>

  <!-- Dashed flight path -->
  <path d="M70 250C110 250 120 150 200 120" fill="none" stroke="#FF6500" stroke-opacity="0.45" stroke-width="2.4" stroke-linecap="round" stroke-dasharray="2 10"/>

  <!-- Paper plane -->
  <g filter="url(#cr-sh)">
    <path d="M198 96L96 150l44 18 12 44 18-30 30 22 -2-108z" fill="#FFFFFF" stroke="#E7EBF1" stroke-width="1.5"/>
  </g>
  <path d="M198 96L140 168l12 44 18-30z" fill="#FFB98C"/>
  <path d="M198 96L96 150l44 18z" fill="url(#cr-o)"/>

  <!-- Message card / form preview -->
