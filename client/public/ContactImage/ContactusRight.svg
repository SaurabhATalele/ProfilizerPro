    <rect x="70" y="232" width="140" height="86" rx="14" fill="#FFFFFF" stroke="#E7EBF1" stroke-width="1.5"/>
  </g>
  <rect x="86" y="250" width="80" height="9" rx="4.5" fill="#FFB98C"/>
  <rect x="86" y="268" width="108" height="8" rx="4" fill="#E7EBF1"/>
  <rect x="86" y="282" width="92" height="8" rx="4" fill="#E7EBF1"/>
  <rect x="86" y="298" width="58" height="12" rx="6" fill="url(#cr-o)"/>

  <path d="M214 300c1.6 8 4 10.4 12 12-8 1.6-10.4 4-12 12-1.6-8-4-10.4-12-12 8-1.6 10.4-4 12-12z" fill="url(#cr-o)" opacity="0.85"/>
</svg>
