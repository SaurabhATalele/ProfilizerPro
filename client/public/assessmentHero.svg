<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI-powered online assessment illustration">
  <defs>
    <linearGradient id="primaryGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF8A3D"/>
      <stop offset="1" stop-color="#FF6500"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF6500"/>
      <stop offset="1" stop-color="#FFB07A"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F4F6FA"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#FF6500" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Ambient background blobs (theme orange, low opacity so it sits on light or dark) -->
  <circle cx="300" cy="90" r="70" fill="#FF6500" opacity="0.10"/>
  <circle cx="78" cy="300" r="54" fill="#FF6500" opacity="0.08"/>

  <!-- Dotted accent grid -->
  <g fill="#FF6500" opacity="0.35">
    <circle cx="40" cy="60" r="3"/>
    <circle cx="60" cy="60" r="3"/>
    <circle cx="80" cy="60" r="3"/>
    <circle cx="40" cy="80" r="3"/>
    <circle cx="60" cy="80" r="3"/>
    <circle cx="80" cy="80" r="3"/>
  </g>

  <!-- Main assessment card -->
  <g filter="url(#softShadow)">
    <rect x="64" y="96" width="210" height="232" rx="22" fill="url(#cardGrad)" stroke="#E7EBF1" stroke-width="1.5"/>
  </g>

  <!-- Card header bar -->
  <rect x="86" y="120" width="120" height="14" rx="7" fill="url(#primaryGrad)"/>
  <rect x="86" y="144" width="78" height="9" rx="4.5" fill="#C7CFDC"/>

  <!-- MCQ option rows -->
  <!-- Correct / selected option -->
  <rect x="86" y="176" width="166" height="34" rx="10" fill="#FFF1E7" stroke="#FF6500" stroke-width="1.6"/>
  <circle cx="105" cy="193" r="9" fill="url(#primaryGrad)"/>
  <path d="M101 193.5l3 3 5.5-6" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="124" y="188" width="104" height="10" rx="5" fill="#FFB98C"/>

  <!-- Other options -->
  <rect x="86" y="218" width="166" height="34" rx="10" fill="#F4F6FA" stroke="#E7EBF1" stroke-width="1.4"/>
  <circle cx="105" cy="235" r="9" fill="#FFFFFF" stroke="#C7CFDC" stroke-width="1.6"/>
  <rect x="124" y="230" width="88" height="10" rx="5" fill="#D3DAE5"/>

  <rect x="86" y="260" width="166" height="34" rx="10" fill="#F4F6FA" stroke="#E7EBF1" stroke-width="1.4"/>
  <circle cx="105" cy="277" r="9" fill="#FFFFFF" stroke="#C7CFDC" stroke-width="1.6"/>
  <rect x="124" y="272" width="72" height="10" rx="5" fill="#D3DAE5"/>

  <!-- Score ring badge (floating, top-right) -->
  <g filter="url(#softShadow)">
    <circle cx="296" cy="172" r="58" fill="#FFFFFF" stroke="#E7EBF1" stroke-width="1.5"/>
  </g>
  <circle cx="296" cy="172" r="40" fill="none" stroke="#EEF1F6" stroke-width="10"/>
  <circle cx="296" cy="172" r="40" fill="none" stroke="url(#ringGrad)" stroke-width="10" stroke-linecap="round"
          stroke-dasharray="251.3" stroke-dashoffset="55" transform="rotate(-90 296 172)"/>
  <text x="296" y="172" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#FF6500">92</text>
  <text x="296" y="190" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#9AA6B6">SCORE</text>

  <!-- Floating analytics chip (bottom-right) -->
  <g filter="url(#softShadow)">
    <rect x="250" y="262" width="86" height="64" rx="14" fill="#FFFFFF" stroke="#E7EBF1" stroke-width="1.5"/>
  </g>
  <rect x="266" y="300" width="10" height="12" rx="3" fill="#FFB98C"/>
  <rect x="282" y="290" width="10" height="22" rx="3" fill="#FF8A3D"/>
  <rect x="298" y="280" width="10" height="32" rx="3" fill="#FF6500"/>
  <rect x="314" y="296" width="10" height="16" rx="3" fill="#FFB98C"/>

  <!-- AI sparkles -->
  <g fill="url(#primaryGrad)">
    <path d="M150 70c2 10 5 13 15 15-10 2-13 5-15 15-2-10-5-13-15-15 10-2 13-5 15-15z"/>
  </g>
  <g fill="#FF6500" opacity="0.85">
    <path d="M96 338c1.2 6 3 7.8 9 9-6 1.2-7.8 3-9 9-1.2-6-3-7.8-9-9 6-1.2 7.8-3 9-9z"/>
  </g>
  <g fill="#FF6500" opacity="0.6">
    <path d="M336 116c1 5 2.6 6.6 7.6 7.6-5 1-6.6 2.6-7.6 7.6-1-5-2.6-6.6-7.6-7.6 5-1 6.6-2.6 7.6-7.6z"/>
  </g>
</svg>
